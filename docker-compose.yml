services:
  x-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3xui-amnezia:latest
    container_name: 3xui_panel
    network_mode: host
    volumes:
      - /etc/x-ui/:/etc/x-ui/
      - /etc/amnezia/amneziawg/:/etc/amnezia/amneziawg/
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      XUI_DB_FOLDER: "/etc/x-ui"
      XUI_AMNEZIA_RUNTIME: "docker"
      XUI_AMNEZIA_DOCKER_CONTAINER: "3xui_amneziawg"
    restart: unless-stopped

  amneziawg:
    build:
      context: ./docker/amneziawg
      dockerfile: Dockerfile
    image: 3xui-amneziawg:latest
    container_name: 3xui_amneziawg
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - /etc/amnezia/amneziawg/:/etc/amnezia/amneziawg/
      - /lib/modules:/lib/modules:ro
      - ./docker/amneziawg/entrypoint.sh:/entrypoint.sh:ro
    environment:
      LOG_LEVEL: "info"
      WG_QUICK_USERSPACE_IMPLEMENTATION: "amneziawg-go"
    entrypoint:
      - /bin/sh
      - /entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "awg show interfaces 2>/dev/null | grep -q 'awg' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
