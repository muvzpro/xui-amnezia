services:
  amneziawg:
    image: amneziavpn/amneziawg-go:latest
    container_name: 3xui_amneziawg
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - /etc/amnezia/amneziawg/:/etc/amnezia/amneziawg/
      - /lib/modules:/lib/modules:ro
      - ./docker/amneziawg/entrypoint.sh:/entrypoint.sh:ro
    environment:
      LOG_LEVEL: "info"
      WG_QUICK_USERSPACE_IMPLEMENTATION: "amneziawg-go"
    entrypoint:
      - /bin/sh
      - /entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "awg show interfaces 2>/dev/null | grep -q 'awg' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
