services:
  amneziawg:
    build:
      context: ./docker/amneziawg
      dockerfile: Dockerfile
    image: 3xui-amneziawg:latest
    container_name: 3xui_amneziawg
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /etc/amnezia/amneziawg/:/etc/amnezia/amneziawg/
      - ./docker/amneziawg/entrypoint.sh:/entrypoint.sh:ro
    environment:
      LOG_LEVEL: "info"
      WG_QUICK_USERSPACE_IMPLEMENTATION: "amneziawg-go"
    entrypoint:
      - /bin/sh
      - /entrypoint.sh
    restart: unless-stopped
